<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ahead — AI-Powered Execution Coach</title>
    <meta name="description" content="Plan smarter, focus better, and finish on time. Powered by Nova, your AI execution coach." />
    <script>
      (function() {
        var originalFetch = window.fetch;
        var fetchRef = originalFetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() {
              return fetchRef;
            },
            set: function(val) {
              fetchRef = val;
            }
          });
        } catch (e) {
          console.warn('Could not redefine window.fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
